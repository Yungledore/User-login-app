<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div align="center">
      <div align="center" class="border">
        <div class="header">
          <h1 class="word">Register</h1>
        </div>
        <h2 class="word">
          <form action="/register" method="POST">
            <div class="msg">{{msg}}</div>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              class="textbox"
            />
            <br /><br />
            <input
              type="text"
              id="password"
              name="password"
              placeholder="Enter your password"
              class="textbox"
            />
            <br /><br />
            <input
              type="text"
              id="email"
              name="email"
              placeholder="Enter your Email"
              class="textbox"
            />
            <input type="submit" value="Sign up" class="btn" /> <br /><br />
          </form>
        </h2>
        <p class="bottom">
          already have account? <a class="bottom" href="/login">Sign in here</a>
        </p>
      </div>
    </div>
  </body>
</html>
