<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div align="center">
      <div align="center" class="border">
        <div class="header">
          <h1 class="word">Login</h1>
        </div>
        <h2 class="word">
          <form action="/login" method="POST">
            <div class="msg">{{msg}}</div>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              class="textbox"
            />
            <br /><br />
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              class="textbox"
            />
            <br /><br />
            <input type="submit" value="Sign In" class="btn" /> <br />
            <br />
          </form>
        </h2>
        <p class="botton">
          Don't have account?
          <a class="bottom" href="/register"> Sign up here </a>
        </p>
      </div>
    </div>
  </body>
</html>
