<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../static/styles/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="word">Login</h1>
      </header>

      <main class="border">
        <form action="/login" method="POST">
          <div class="msg">{{msg}}</div>

          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" class="textbox" required>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your Password" class="textbox" required>
          </div>
          <button type="submit" class="btn">Sign In</button>
        </form>

        <p class="bottom">Don't have an account? <a href="/register" class="bottom"> Sign up here </a></p>
      </main>
    </div>
  </body>
</html>
